<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Shopee UI Practice</title>
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
	<link rel="stylesheet" href="./style.css">
</head>

<body>
	<div class="page">
		<header id="main_header" class="header">
			<div id="top_bar" class="topBar">
				<div class="leftLinks">
					<a href="https://banhang.shopee.vn/" class="hover topItem">Kênh Người Bán</a>
					<a href="https://banhang.shopee.vn/portal/vn-onboarding/" class="hover topItem">Trở thành Người bán Shopee</a>
					<a href="https://shopee.vn/" class="hover topItem">Tải ứng dụng</a>
					<div class="connectGroup">
						<a href="#" class="hover">Kết nối</a>
						<a href="https://www.facebook.com/ShopeeVN" class="hover socialIcon" aria-label="Facebook"><i class="fa-brands fa-facebook"></i></a>
						<a href="https://www.instagram.com/shopeevn/" class="hover socialIcon" aria-label="Instagram"><i class="fa-brands fa-instagram"></i></a>
					</div>
				</div>
				<div class="rightLinks"> <!--Em làm biếng link quá :D-->
					<span class="hover">Thông Báo</span>
					<span class="hover">Hỗ Trợ</span>
					<span class="hover">Tiếng Việt</span>
					<span class="strong hover">Đăng Ký</span>
					<span class="strong hover">Đăng Nhập</span>
				</div>
			</div>

			<div id="search_row" class="searchRow">
				<div class="logo">
					<a href="https://shopee.vn/" class="hover"><img src="https://upload.wikimedia.org/wikipedia/commons/thumb/f/fe/Shopee.svg/3840px-Shopee.svg.png" alt="Shopee logo"></a>
				</div>
				<div id="search_box" class="searchBox">
					<input id="search_input" type="text" placeholder="Shopee bao ship 0Đ - MUA NGAY !">
					<button id="search_button" class="hover">Tìm</button>
				</div>
				<a id="cart_link" href="#" class="cart hover" aria-label="Giỏ hàng">
					<i class="fa-solid fa-cart-shopping" aria-hidden="true"></i>
				</a>
			</div>

			<div id="quick_links" class="quickLinks">
				<a href="https://shopee.vn/mall/search?keyword=8%20plus%20gi%C3%A1%20r%E1%BA%BB" class="hover">8 Plus Giá Rẻ</a>
				<a href="https://shopee.vn/mall/search?keyword=%C3%A1o%20mu" class="hover">Áo MU</a>
				<a href="https://shopee.vn/mall/search?keyword=d%C3%A9p" class="hover">Dép</a>
				<a href="https://shopee.vn/mall/search?keyword=qu%E1%BA%A7n%20jean%20chanel" class="hover">Quần Jean Chanel</a>
				<a href="https://shopee.vn/mall/search?keyword=%C3%A1o%20kho%C3%A1c%20nam" class="hover">Áo Khoác Nam</a>
				<a href="https://shopee.vn/mall/search?keyword=gi%C3%A0y%20th%E1%BB%83%20thao%20n%E1%BB%AF" class="hover">Giày Thể Thao Nữ</a>
			</div>
		</header>
	</div>
</body>
</html>
